name: CI

on:
push:
branches: [main]
pull_request:
branches: [main]
jobs:
build:
runs-on: ubuntu-latest

steps:
-name: Checkout code
uses: action/checkout@v4

-name: Set up Node.js
uses: action/setup-node@v4
with:
node-version: '20'

-name: Install backend dependencies
run: npm install

-name: Build Docker image
run: docker build -t url-shortener-backend .